services:
  caddy-reverse-proxy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data # important for storing certificates
      - caddy_config:/config
    networks:
      - avaluma-net

volumes:
  caddy_data:
  caddy_config:

networks:
  avaluma-net:
    name: avaluma-net
    driver: bridge
